<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice Flower</title>
    <link rel="website icon" type="png" href="image/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        html{
            scroll-behavior: smooth;
        }

        body {
            background: whitesmoke;
        }

        #home {
            background: url(image/snapedit_1772850265826.jpg) no-repeat;
            background-size: cover;
            background-position: center;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        #home header {
            text-align: center;
        }

        #home header h1 {
            font-size: 4em;
            word-spacing: 4px;
            letter-spacing: 3px;
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(90deg, #b84a6a, #f3c6cf);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200%;
            animation: gradientMove 6s ease infinite;
        }


        .wrapper1 {
            width: 100%;
            max-width: 780px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);

            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }


        nav ul {
            list-style-type: none;
        }

        nav a {
            text-decoration: none;
            display: block;
            text-align: center;
            color: #b84a6a;
            padding: 10px;
            border-radius: 20px;
        }

        nav a:hover {
            background: #f3c6cf;
            color: #7a2e45;
        }

        #about {
            background: #E9D7C5;
            height: 100vh;

        }

        #about .img1 {
            background: url(image/gambar1.jpeg) no-repeat;
            background-position: center;
            background-size: cover;
            width: 100%;
            height: 13vh;
        }

        #store {
            background: #8800ff;
            height: 100vh;
        }


        @media screen and (min-width:680px) {

            .wrapper1 {
                border-radius: 20px;
            }

            nav ul {
                display: flex;
                justify-content: center;
                flex: 1 1 0;
            }

            nav li {
                flex: 1 1 0;
            }

            nav {
                display: flex;
                justify-content: center;
            }


        }

        @keyframes gradientMove {
            0% {
                background-position: 0%;
            }

            100% {
                background-position: 200%;
            }
        }
    </style>
</head>

<body>
    <section id="home">
        <div class="wrapper1">
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#store">Store</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
        <header>
            <h1>Alice Flower</h1>
        </header>
    </section>

    <section id="about">
        <div class="img1"></div>


    </section>

    <section id="store">


    </section>
</body>

</html>
